<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Mindsmith Cooksite</title>

    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="images/sign-up-favicon.ico" type="image/x-icon">

    <!-- Stylesheet -->
     
    <link rel="stylesheet" href="sign-up.css">
</head>
<body>

        <div class="holder quicksand"> <!-- Quicksand font & Holder Style -->

                        
            <h1>Sign Up</h1>
            <img src="images/sign-up-logo.png" alt="Sign up image" width="200px" height="auto">
            <p>Create your account for free and access 5000+ Recipes</p>
        
            <form>

                <div class="main-form">

                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Enter your username" required>

                    
                        <label for="email">Email</label>
                        <input type="email"id="email" placeholder="Enter your email" required>


                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Use a strong password" required>

                </div>

                

                <input type="checkbox" id="term" required>
                <label for="term">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy policy</a>.</label><br><br>

                <button class="submit" title="Feature Unavailable">Sign Up</button>

                <p>Already have an account? <a href="login.html" class="Sign-In">Log In</a></p>
                
            </form>

        </div>

    

</body>
</html>
